<form #productForm="ngForm" (ngSubmit)="onSave()" class="product-form">
  <div class="form-group">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" [(ngModel)]="product.name" required />
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" [(ngModel)]="product.description" required></textarea>
  </div>

  <div class="form-group">
    <label for="price">Price</label>
    <input id="price" name="price" type="number" min="0" step="0.01" [(ngModel)]="product.price" required />
  </div>

  <div class="form-group">
    <label for="stockQuantity">Stock Quantity</label>
    <input id="stockQuantity" name="stockQuantity" type="number" min="0" step="1" [(ngModel)]="product.stockQuantity" required />
  </div>

  <div class="form-group" *ngIf="isEditMode">
    <label>
      <input type="checkbox" name="delete" [(ngModel)]="product.delete" /> Delete
    </label>
  </div>

  <div class="form-group" *ngIf="isEditMode">
    <label for="status">Status</label>
    <select id="status" name="status" [(ngModel)]="product.status">
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>
  </div>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>

  <div class="form-actions">
    <button type="submit" class="btn save-btn" [disabled]="isLoading">
      {{ isLoading ? 'Saving...' : 'Save' }}
    </button>
    <button type="button" class="btn exit-btn" (click)="onExit()">Exit</button>
    <button type="button" class="btn clear-btn" (click)="onClear()">Clear Fields</button>
  </div>
</form>
