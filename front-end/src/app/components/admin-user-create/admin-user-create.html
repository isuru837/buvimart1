<div class="sign-up-container">
  <form (ngSubmit)="onSubmit()" #adminUserForm="ngForm">
    <h2>Add Admin User</h2>
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
    
    <div class="form-group">
      <label>
        Username:
        <input type="text" name="userName" [(ngModel)]="user.userName" required />
      </label>
    </div>

    <div class="form-group">
      <label>
        Password:
        <input type="password" name="password" [(ngModel)]="user.password" required />
      </label>
    </div>

    <div class="form-group">
      <label>
        First Name:
        <input type="text" name="firstName" [(ngModel)]="user.firstName" required />
      </label>
    </div>

    <div class="form-group">
      <label>
        Last Name:
        <input type="text" name="lastName" [(ngModel)]="user.lastName" required />
      </label>
    </div>

    <div class="form-group">
      <label>
        Email:
        <input type="email" name="email" [(ngModel)]="user.email" required />
      </label>
    </div>

    <div class="form-group">
      <label>
        Mobile:
        <input type="tel" name="mobile" [(ngModel)]="user.mobile" required />
      </label>
    </div>

    <div class="form-group">
      <label>
        Address Line 1:
        <input type="text" name="addressLine1" [(ngModel)]="user.addressLine1" required />
      </label>
    </div>

    <div class="form-group">
      <label>
        Address Line 2:
        <input type="text" name="addressLine2" [(ngModel)]="user.addressLine2" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Address Line 3:
        <input type="text" name="addressLine3" [(ngModel)]="user.addressLine3" />
      </label>
    </div>

    <div class="form-group">
      <label>
        Role:
        <input type="text" name="role" [value]="'ADMIN'" disabled />
      </label>
    </div>

    <div class="button-group">
      <button type="submit" class="btn">Save</button>
      <button type="button" class="btn clear-btn" (click)="onClear()">Clear</button>
      <button type="button" class="btn exit-btn" (click)="onExit()">Exit</button>
    </div>
  </form>
</div>
