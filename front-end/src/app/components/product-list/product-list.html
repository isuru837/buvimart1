

<div class="product-grid">
  <!-- Loading state -->
  <div *ngIf="isLoadingState" class="loading">
    <p>Loading products... (isLoading: {{ isLoading }})</p>
  </div>

  <!-- Error state -->
  <div *ngIf="errorMessage" class="error">
    <p>{{ errorMessage }}</p>
    <button (click)="loadProducts()" class="retry-btn">Retry</button>
  </div>

  <!-- No results state -->
  <div *ngIf="!isLoadingState && !errorMessage && filteredProducts.length === 0" class="no-results">
    <p>No products found matching your search.</p>
  </div>

  <!-- Products grid -->
  <div class="product-card" *ngFor="let product of filteredProducts">
    <h3>{{ product.name }}</h3>
    <p>💰 Price: ${{ product.price }}</p>
    <p>📦 Quantity: {{ product.stockQuantity }}</p>
    <div class="product-actions">
      <button class="btn buy-btn" (click)="onBuyNow(product)">Buy now</button>
      <button class="btn cart-btn" (click)="onAddToCart(product)">To Cart</button>
    </div>
  </div>
</div>
