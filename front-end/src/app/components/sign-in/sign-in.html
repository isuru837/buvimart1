<div class="sign-in-container">
  <form (ngSubmit)="onSubmit()" #signInForm="ngForm">
    <h2>Sign In</h2>
    <div class="form-group">
      <label>
        Username:
        <input type="text" name="userName" [(ngModel)]="user.userName" required />
      </label>
    </div>
  
    <div class="form-group">
      <label>
        Password:
        <input type="password" name="password" [(ngModel)]="user.password" required />
      </label>
    </div>
    <button type="submit" class="btn">Sign In</button>
    <button type="button" class="btn back-btn" (click)="goBack()">Back to Products</button>
  </form>
</div>
