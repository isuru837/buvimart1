<div class="change-password-container">
  <form (ngSubmit)="onSubmit()" #changePasswordForm="ngForm">
    <h2>Change Password</h2>
    <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    <div class="form-group">
      <label>Old Password:
        <input type="password" name="oldPassword" [(ngModel)]="oldPassword" required #oldPasswordField="ngModel" />
      </label>
      <div *ngIf="validationErrors['oldPassword']" class="validation-error">{{ validationErrors['oldPassword'] }}</div>
    </div>
    <div class="form-group">
      <label>New Password:
        <input type="password" name="newPassword" [(ngModel)]="newPassword" required #newPasswordField="ngModel" />
      </label>
      <div *ngIf="validationErrors['newPassword']" class="validation-error">{{ validationErrors['newPassword'] }}</div>
    </div>
    <div class="form-group">
      <label>Re-type New Password:
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required #confirmPasswordField="ngModel" />
      </label>
      <div *ngIf="validationErrors['confirmPassword']" class="validation-error">{{ validationErrors['confirmPassword'] }}</div>
    </div>
    <button type="submit" class="btn">Change Password</button>
  </form>
</div>
