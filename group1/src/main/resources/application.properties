spring.application.name=bssm-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bssm_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8085

# JWT Configuration
jwt.secret=your-256-bit-secret-key-here-make-it-long-and-secure
jwt.expiration=3000
jwt.refresh.expiration=8640

# Basic User Configuration for Testing
#spring.security.user.name=testuser
#spring.security.user.password=testpass

# Rate Limiter Configuration
resilience4j.ratelimiter.instances.loginRateLimiter.limitForPeriod=3
resilience4j.ratelimiter.instances.loginRateLimiter.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.loginRateLimiter.timeoutDuration=0s
resilience4j.ratelimiter.instances.loginRateLimiter.registerHealthIndicator=true
resilience4j.ratelimiter.instances.loginRateLimiter.eventConsumerBufferSize=100

# Products Rate Limiter Configuration
resilience4j.ratelimiter.instances.productsRateLimiter.limitForPeriod=30
resilience4j.ratelimiter.instances.productsRateLimiter.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.productsRateLimiter.timeoutDuration=0s
resilience4j.ratelimiter.instances.productsRateLimiter.registerHealthIndicator=true
resilience4j.ratelimiter.instances.productsRateLimiter.eventConsumerBufferSize=100

# User Registration Rate Limiter Configuration
resilience4j.ratelimiter.instances.registerRateLimiter.limitForPeriod=5
resilience4j.ratelimiter.instances.registerRateLimiter.limitRefreshPeriod=1h
resilience4j.ratelimiter.instances.registerRateLimiter.timeoutDuration=0s
resilience4j.ratelimiter.instances.registerRateLimiter.registerHealthIndicator=true
resilience4j.ratelimiter.instances.registerRateLimiter.eventConsumerBufferSize=100
