spring.application.name=bssm-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bssm_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8085

# JWT Configuration
jwt.secret=your-256-bit-secret-key-here-make-it-long-and-secure
jwt.expiration=300
jwt.refresh.expiration=8640

# Basic User Configuration for Testing
spring.security.user.name=testuser
spring.security.user.password=testpass
